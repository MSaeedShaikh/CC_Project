<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirecting...</title>
  <link rel="stylesheet" href="/static/output.css">
  <script>
    if (localStorage.getItem('theme') === 'dark' ||
        (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.classList.add('dark');
    }
  </script>
</head>
<body class="bg-gray-50 dark:bg-gray-950 min-h-screen flex items-center justify-center">

  <div class="max-w-xl w-full mx-auto px-4 text-center">

    <!-- Countdown + status -->
    <div class="mb-8">
      <p class="text-gray-500 dark:text-gray-400 text-sm mb-2">You are being redirected to</p>
      <p class="text-gray-800 dark:text-gray-200 font-medium text-sm break-all px-4 py-2 bg-gray-100 dark:bg-gray-800 rounded-lg">
        {{ destination }}
      </p>
      <div class="mt-4 flex items-center justify-center gap-2">
        <svg class="animate-spin h-4 w-4 text-indigo-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"></path>
        </svg>
        <span class="text-indigo-600 dark:text-indigo-400 font-semibold text-sm">
          Redirecting in <span id="countdown">4</span>s
        </span>
      </div>
    </div>

    <!-- Ad placeholder -->
    <div class="bg-white dark:bg-gray-900 border-2 border-dashed border-gray-300 dark:border-gray-700 rounded-2xl p-10 mb-6">
      <p class="text-xs font-semibold text-gray-400 dark:text-gray-600 uppercase tracking-widest mb-3">Advertisement</p>
      <div class="h-24 flex items-center justify-center bg-gray-50 dark:bg-gray-800 rounded-xl">
        <p class="text-gray-300 dark:text-gray-600 text-sm">Ad space — 728 × 90</p>
      </div>
    </div>

    <!-- Manual redirect -->
    <p class="text-xs text-gray-400 dark:text-gray-600">
      Not redirected?
      <a id="manual-link" href="{{ destination }}" data-dest="{{ destination }}"
        class="text-indigo-500 hover:underline">Click here</a>
    </p>

  </div>

  <script>
    const destination = document.getElementById('manual-link').dataset.dest;
    let seconds = 4;
    const countdown = document.getElementById('countdown');

    const timer = setInterval(() => {
      seconds -= 1;
      countdown.textContent = seconds;
      if (seconds <= 0) {
        clearInterval(timer);
        window.location.href = destination;
      }
    }, 1000);
  </script>

</body>
</html>
